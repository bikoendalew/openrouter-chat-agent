<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- background -->
  <rect width="32" height="32" rx="8" fill="#6366f1"/>
  <!-- robot head -->
  <rect x="8" y="10" width="16" height="13" rx="3" fill="white"/>
  <!-- eyes -->
  <rect x="11" y="14" width="3" height="3" rx="1.5" fill="#6366f1"/>
  <rect x="18" y="14" width="3" height="3" rx="1.5" fill="#6366f1"/>
  <!-- mouth -->
  <rect x="12" y="19" width="8" height="2" rx="1" fill="#6366f1"/>
  <!-- antenna -->
  <rect x="15" y="6" width="2" height="4" rx="1" fill="white"/>
  <circle cx="16" cy="5" r="2" fill="white"/>
  <!-- ears -->
  <rect x="5" y="13" width="3" height="5" rx="1.5" fill="white"/>
  <rect x="24" y="13" width="3" height="5" rx="1.5" fill="white"/>
</svg>
